name: Periodically bump flake.lock (and build cache)
on:
  workflow_dispatch:
  schedule:
    - cron: 0 */3 * * *
permissions:
  contents: write
concurrency:
  group: cache
jobs:
  bump:
    runs-on: ubuntu-24.04
    outputs:
      updated: ${{ steps.update.outputs.updated }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            extra-experimental-features = pipe-operators
      - id: update
        run: |
          nix flake update
          nix run --inputs-from . nixpkgs#nvfetcher
          if git diff --quiet; then
            echo "unchanged"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
      - if: steps.update.outputs.updated == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-lockfiles
          path: |
            flake.lock
            _sources/
  build:
    needs: bump
    if: needs.bump.outputs.updated == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
          - system: x86_64-linux
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: updated-lockfiles
      - uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            extra-experimental-features = pipe-operators
      - uses: cachix/cachix-action@v17
        with:
          name: thou-vow
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: |
          cachix watch-exec -m xz -l 9 thou-vow -- \
            nix build -L --no-link --impure --expr \
            'builtins.attrValues (builtins.getFlake (toString ./.)).checks.${{ matrix.system }}'
  commit:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: updated-lockfiles
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: bump packages to $(date +%Y-%m-%dT%H:%MZ)"
          git push
