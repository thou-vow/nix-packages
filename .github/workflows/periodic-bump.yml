name: Periodically update flake.lock and build cache
on:
  workflow_dispatch:
  schedule:
    - cron: 0 */2 * * *
permissions:
  contents: write
concurrency:
  group: cache
jobs:
  update:
    runs-on: ubuntu-24.04
    outputs:
      updated: ${{ steps.update.outputs.updated }}
    steps:
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            build-dir = /nix/build

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sources
        id: update
        run: |
          nix run .#nvfetcher
          nix flake update
          if git diff --quiet; then
            echo "unchanged"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "changed"
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload new lockfiles
        if: steps.update.outputs.updated == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-lockfiles
          path: |
            flake.lock
            _sources/

  build:
    needs: update
    if: needs.update.outputs.updated == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
          - runner: ubuntu-24.04-arm
    steps:
      - name: Reclaim space!
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'holster'
          nix-permission-edict: true

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: thou-vow
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download new lockfiles
        uses: actions/download-artifact@v8
        with:
          name: updated-lockfiles

      - name: Build cache
        run: |
          set -euo pipefail
          nix build --file ./ci-cache.nix --print-out-paths -L \
            | cachix push -m xz -l 9 thou-vow
  commit:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download new lockfiles
        uses: actions/download-artifact@v8
        with:
          name: updated-lockfiles

      - name: Make commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(deps): bump sources to $(date +%Y-%m-%dT%H:%MZ)"
          git push
