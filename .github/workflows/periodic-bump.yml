name: Periodically bump flake.lock (and build cache)
on:
  workflow_dispatch:
  schedule:
    - cron: 0 */3 * * *
permissions:
  contents: write
concurrency:
  group: bump
jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: nixbuild/nix-quick-install-action@34
        with:
          extra-conf: |
            extra-experimental-features = pipe-operators
      - id: update
        run: |
          nix flake update
          if git diff --quiet -- flake.lock; then
            echo "unchanged"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
      - if: steps.update.outputs.updated == 'true'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run --inputs-from . nixpkgs#nix-fast-build -- \
            --cachix-cache thou-vow --no-nom --skip-cache
      - if: steps.update.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "ci: bump packages to $(date +%Y-%m-%dT%H:%MZ)"
          git push
