name: Periodically bump flake.lock (and build cache)
on:
  workflow_dispatch:
  schedule:
    - cron: 0 */3 * * *
permissions:
  contents: write
  id-token: read
concurrency:
  group: bump
jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: |
            extra-experimental-features = pipe-operator
      - id: update
        run: |
          nix --accept-flake-config flake update
          if git diff --quiet -- flake.lock; then
            echo "flake.lock unchanged"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
      - if: steps.update.outputs.updated == 'true'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix --accept-flake-config shell --inputs-from . \
            .#determinate-nix-fast-build .#determinate-nurl nixpkgs#python3

          python update-srcs.py < srcs.json > tmp-srcs.json 
          mv tmp-srcs.json srcs.json

          nix-fast-build --cachix-cache thou-vow --no-nom --skip-cache
      - if: steps.update.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "ci: bump packages to $(date +%Y-%m-%dT%H:%MZ)"
          git push
