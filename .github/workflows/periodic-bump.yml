name: Periodically bump flake.lock (and build cache)
on:
  workflow_dispatch:
  schedule:
    - cron: 0 */3 * * *
permissions:
  contents: write
concurrency:
  group: bump
jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            extra-experimental-features = pipe-operators
      - id: update
        run: |
          nix flake update
          nix run --inputs-from . nixpkgs#nvfetcher
          if git diff --quiet; then
            echo "unchanged"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
      - if: steps.update.outputs.updated == 'true'
        uses: cachix/cachix-action@v17
        with:
          name: thou-vow
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - if: steps.update.outputs.updated == 'true'
        run: |
          cachix watch-exec -m xz -l 9 thou-vow -- \
            nix build -L --no-link --impure --expr \
            'builtins.attrValues (builtins.getFlake (toString ./.)).checks.x86_64-linux'
      - if: steps.update.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: bump packages to $(date +%Y-%m-%dT%H:%MZ)"
          git push
