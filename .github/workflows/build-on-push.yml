name: Build cache (after a commit) without updating
on:
  push:
  workflow_dispatch:
    inputs:
      package:
        description: 'Flake output to build'
        required: true
        default: 'cache'
        type: string
      runner:
        description: 'Runner to use'
        required: true
        default: 'ubuntu-24.04'
        type: choice
        options:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - both
concurrency:
  group: cache
  cancel-in-progress: true
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
      runner: ${{ fromJSON( if(inputs.runner == 'both', '["ubuntu-24.04", "ubuntu-24.04-arm"]', format('["{0}"]', inputs.runner)) ) }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with:
          name: thou-vow
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: |
          set -euo pipefail

          echo "Building .#${{ inputs.package }}"

          nix build ".#${{ inputs.package }}" --print-out-paths -L \
            | cachix push -m xz -l 9 thou-vow
