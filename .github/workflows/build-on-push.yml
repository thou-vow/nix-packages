name: Build cache (after a commit) without updating
on:
  push:
  workflow_dispatch:
concurrency:
  group: cache
  cancel-in-progress: true
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
          - runner: ubuntu-24.04-arm
    steps:
      - name: Reclaim space!
        uses: wimpysworld/nothing-but-nix@main

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            build-dir = /nix/build

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build cache
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run --inputs-from . nixpkgs#nix-fast-build -- \
            --file ./ci-cache.nix --cachix-cache thou-vow --skip-cached \
            --max-jobs 0 --no-nom --fail-fast
