name: Build cache after a commit
on:
  push:
  workflow_dispatch:
concurrency:
  group: bump
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: nixbuild/nix-quick-install-action@v34
        with:
          extra-conf: |
            extra-experimental-features = pipe-operators
      - env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix run .#determinate-nix-fast-build -- \
            --cachix-cache thou-vow --no-nom --skip-cache
